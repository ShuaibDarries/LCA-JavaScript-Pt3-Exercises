<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Magical Spell Generator</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&family=Patrick+Hand&display=swap");

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Patrick Hand", cursive;
        background-color: #f5f0e6;
        background-image:
          radial-gradient(#e8e0d0 1px, transparent 1px),
          radial-gradient(#e8e0d0 1px, transparent 1px);
        background-size: 20px 20px;
        background-position:
          0 0,
          10px 10px;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
      }

      .container {
        background: #fffef8;
        border: 3px solid #8b7355;
        border-radius: 8px;
        padding: 35px 40px;
        max-width: 550px;
        width: 100%;
        box-shadow:
          4px 4px 0px #c4b49a,
          8px 8px 15px rgba(0, 0, 0, 0.15);
        position: relative;
      }

      .container::before {
        content: "";
        position: absolute;
        top: -8px;
        left: 20px;
        right: 20px;
        height: 4px;
        background: repeating-linear-gradient(
          90deg,
          #8b7355 0px,
          #8b7355 8px,
          transparent 8px,
          transparent 12px
        );
        opacity: 0.6;
      }

      h1 {
        font-family: "Caveat", cursive;
        font-size: 2.6em;
        color: #5c4033;
        text-align: center;
        margin-bottom: 8px;
        transform: rotate(-1.5deg);
        text-shadow: 1px 1px 0px rgba(0, 0, 0, 0.1);
      }

      .subtitle {
        text-align: center;
        color: #a08060;
        font-size: 1.1em;
        margin-bottom: 25px;
        font-style: italic;
      }

      .ingredients-section {
        background: #faf6f0;
        border: 2px dashed #c4b49a;
        border-radius: 6px;
        padding: 18px 22px;
        margin-bottom: 25px;
      }

      .ingredients-section h3 {
        color: #7a5c3c;
        font-size: 1.3em;
        margin-bottom: 12px;
        font-family: "Caveat", cursive;
        font-size: 1.6em;
      }

      ul {
        list-style: none;
        padding-left: 5px;
      }

      li {
        padding: 6px 0;
        color: #6b5344;
        font-size: 1.15em;
        position: relative;
        padding-left: 28px;
      }

      li::before {
        content: "✦";
        position: absolute;
        left: 0;
        color: #c9a86c;
        font-size: 1.1em;
      }

      .spell-area {
        min-height: 120px;
        border: 2px solid #b8a088;
        border-radius: 6px;
        margin-bottom: 25px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
        padding: 20px;
        background: #fdfcfa;
        transition: all 0.3s ease;
        position: relative;
        overflow: hidden;
      }

      .spell-area::after {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background-image:
          radial-gradient(
            circle at 20% 50%,
            rgba(255, 255, 255, 0.4) 0%,
            transparent 50%
          ),
          radial-gradient(
            circle at 80% 50%,
            rgba(255, 255, 255, 0.3) 0%,
            transparent 50%
          );
        pointer-events: none;
      }

      .spell-area p {
        font-family: "Caveat", cursive;
        font-size: 1.9em;
        color: #5c4033;
        z-index: 1;
      }

      .spell-area .countdown {
        font-family: "Caveat", cursive;
        font-size: 3em;
        color: #8b6914;
        z-index: 1;
        animation: pulse 0.5s ease-in-out;
      }

      @keyframes pulse {
        0%,
        100% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.2);
        }
      }

      .spell-area .ingredient-display {
        font-family: "Caveat", cursive;
        font-size: 2.2em;
        color: #5c4033;
        z-index: 1;
        animation: fadeInUp 0.6s ease-out;
      }

      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(15px) rotate(-2deg);
        }
        to {
          opacity: 1;
          transform: translateY(0) rotate(0deg);
        }
      }

      .spell-area .magic-text {
        font-size: 0.9em;
        color: #a08060;
        margin-top: 8px;
        z-index: 1;
      }

      .buttons {
        display: flex;
        gap: 15px;
        justify-content: center;
      }

      button {
        font-family: "Patrick Hand", cursive;
        font-size: 1.2em;
        padding: 12px 28px;
        border: 2px solid #8b7355;
        border-radius: 5px;
        cursor: pointer;
        transition: all 0.15s ease;
        position: relative;
        overflow: hidden;
      }

      button:active {
        transform: translateY(2px);
      }

      #generateButton {
        background: #e8ddd0;
        color: #5c4033;
        box-shadow: 2px 3px 0px #c4b49a;
      }

      #generateButton:hover {
        background: #ddd0c0;
        transform: translateY(-1px);
      }

      #generateButton:active {
        box-shadow: 1px 1px 0px #c4b49a;
        transform: translateY(2px);
      }

      #generateButton:disabled {
        opacity: 0.6;
        cursor: not-allowed;
        transform: none;
      }

      #resetButton {
        background: #f0e8e0;
        color: #7a5c3c;
        box-shadow: 2px 3px 0px #c4b49a;
      }

      #resetButton:hover {
        background: #e8ddd5;
        transform: translateY(-1px);
      }

      #resetButton:active {
        box-shadow: 1px 1px 0px #c4b49a;
        transform: translateY(2px);
      }

      .corner-decoration {
        position: absolute;
        width: 30px;
        height: 30px;
        opacity: 0.3;
      }

      .corner-decoration.top-left {
        top: 10px;
        left: 10px;
        border-top: 3px solid #8b7355;
        border-left: 3px solid #8b7355;
      }

      .corner-decoration.top-right {
        top: 10px;
        right: 10px;
        border-top: 3px solid #8b7355;
        border-right: 3px solid #8b7355;
      }

      .corner-decoration.bottom-left {
        bottom: 10px;
        left: 10px;
        border-bottom: 3px solid #8b7355;
        border-left: 3px solid #8b7355;
      }

      .corner-decoration.bottom-right {
        bottom: 10px;
        right: 10px;
        border-bottom: 3px solid #8b7355;
        border-right: 3px solid #8b7355;
      }

      .sparkle {
        position: absolute;
        pointer-events: none;
        animation: sparkleFloat 1s ease-out forwards;
        font-size: 1.5em;
        z-index: 10;
      }

      @keyframes sparkleFloat {
        0% {
          opacity: 1;
          transform: translate(0, 0) scale(0);
        }
        50% {
          opacity: 1;
          transform: translate(var(--tx), var(--ty)) scale(1);
        }
        100% {
          opacity: 0;
          transform: translate(calc(var(--tx) * 2), calc(var(--ty) * 2))
            scale(0);
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="corner-decoration top-left"></div>
      <div class="corner-decoration top-right"></div>
      <div class="corner-decoration bottom-left"></div>
      <div class="corner-decoration bottom-right"></div>

      <h1>Welcome to the Magical Spell Generator!</h1>
      <p class="subtitle">~ where ancient ingredients come alive ~</p>

      <div class="ingredients-section">
        <h3>Available Ingredients</h3>
        <ul id="ingredientsList">
          <li>Dragon Scale</li>
          <li>Phoenix Feather</li>
          <li>Unicorn Horn</li>
        </ul>
      </div>

      <div id="spellArea" class="spell-area">
        <p>Your spell will appear here...</p>
      </div>

      <div class="buttons">
        <button id="generateButton">Generate Spell</button>
        <button id="resetButton">Reset</button>
      </div>
    </div>

    <script src="week8_ex01_dom_spell_generator.js"></script>
  </body>
</html>
